services:
  picture-mysql:
    image: mysql:8.0
    platform: linux/arm64
    container_name: picture_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: picture_db
      MYSQL_ROOT_HOST: '%'
    ports:
      - "33060:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build: ./picture-backend
    container_name: picture_backend
    restart: always
    ports:
      - "8140:8140"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://picture-mysql:3306/picture_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&enabledTLSProtocols=TLSv1.2
    depends_on:
      picture-mysql:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./images:/app/images

  frontend:
    build: ./picture-frontend
    container_name: picture_frontend
    ports:
      - "4140:4140"
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network
    volumes:
      - ./images:/usr/share/nginx/html/images

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
